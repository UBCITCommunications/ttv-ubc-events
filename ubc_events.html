<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UBC Events — What's On</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-weight: 300;
    height: 100vh;
    position: relative;
  }

  /* HERO IMAGE — covers left ~60% */
  .hero {
    position: absolute;
    inset: 0;
    width: 60%;
    background: #161b22;
    background-size: cover;
    background-position: center;
    transition: background-image 0.6s ease;
  }
  .hero::after {
    /* subtle vignette into the card area on the right */
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, transparent 60%, rgba(13, 17, 23, 0.85) 100%);
  }

  /* CARD — right side */
  .card {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 42%;
    padding: 6vh 4vw 4vh 4vw;
    display: flex;
    flex-direction: column;
    background: rgba(13, 17, 23, 0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .type-tag {
    font-size: 0.85vw;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #58a6ff;
    margin-bottom: 2.5vh;
  }

  .title {
    font-size: 3vw;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 3vh;
  }

  .when {
    font-size: 1.4vw;
    color: #e6edf3;
    margin-bottom: 1vh;
    font-weight: 400;
  }
  .where {
    font-size: 1.1vw;
    color: #8b949e;
    margin-bottom: 3vh;
  }

  .summary {
    font-size: 1vw;
    line-height: 1.5;
    color: #c9d1d9;
    margin-bottom: 3vh;
    flex: 1;
    overflow: hidden;
    /* show only first ~5 lines */
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
  }

  /* QR area at the bottom of the card */
  .qr-row {
    display: flex;
    align-items: center;
    gap: 1.4vw;
    padding-top: 2.5vh;
    border-top: 1px solid #21262d;
  }
  .qr {
    width: 7vw;
    height: 7vw;
    background: #e6edf3;
    padding: 0.4vw;
    border-radius: 0.3vw;
    flex-shrink: 0;
  }
  .qr svg { width: 100%; height: 100%; display: block; }
  .qr-label {
    font-size: 0.85vw;
    color: #8b949e;
    letter-spacing: 0.05em;
    line-height: 1.5;
  }
  .qr-label strong {
    display: block;
    color: #e6edf3;
    font-weight: 500;
    font-size: 0.95vw;
    margin-bottom: 0.3vh;
  }

  /* HEADER strip */
  .header {
    position: absolute;
    top: 0;
    left: 0;
    width: 60%;
    padding: 4vh 4vw;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .header .brand {
    font-size: 0.85vw;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #c9d1d9;
    text-shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.5);
  }
  .counter {
    position: absolute;
    bottom: 3vh;
    left: 4vw;
    font-size: 0.75vw;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(230, 237, 243, 0.6);
    text-shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.6);
    font-variant-numeric: tabular-nums;
  }

  /* Loading/empty states */
  .splash {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #484f58;
    font-size: 1.5vw;
    background: #0d1117;
    z-index: 100;
  }
  .splash.hidden { display: none; }
</style>
</head>
<body>

<div class="hero" id="hero"></div>

<div class="header">
  <div class="brand">UBC Events · What's On</div>
</div>

<div class="counter" id="counter"></div>

<div class="card" id="card"></div>

<div class="splash" id="splash">Loading events…</div>

<script>
const DATA_URL    = 'events.json';
const RELOAD_MS   = 6 * 60 * 60 * 1000;  // re-read JSON every 6h
const ROTATE_MS   = 12 * 1000;           // 12 sec per event

let events = [];
let idx    = 0;

async function loadData() {
  try {
    const res  = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await res.json();
    events = data.events || [];
    idx    = idx % Math.max(events.length, 1);
    if (events.length === 0) {
      showSplash('No upcoming events in the next week.');
    } else {
      hideSplash();
      render();
    }
  } catch (e) {
    console.error('Events load failed:', e);
    showSplash('Unable to load events.');
  }
}

function showSplash(msg) {
  const s = document.getElementById('splash');
  s.textContent = msg;
  s.classList.remove('hidden');
}
function hideSplash() {
  document.getElementById('splash').classList.add('hidden');
}

function render() {
  if (events.length === 0) return;
  const e = events[idx];

  // Hero image
  document.getElementById('hero').style.backgroundImage = `url('${e.image}')`;

  // Card content
  document.getElementById('card').innerHTML = `
    <div class="type-tag">${escapeHtml(e.type || 'Event')}</div>
    <div class="title">${escapeHtml(e.title)}</div>
    <div class="when">${escapeHtml(formatWhen(e))}</div>
    <div class="where">${escapeHtml(formatWhere(e))}</div>
    <div class="summary">${escapeHtml(e.summary || '')}</div>
    <div class="qr-row">
      <div class="qr" id="qr"></div>
      <div class="qr-label">
        <strong>More info</strong>
        Scan to view details and register
      </div>
    </div>
  `;

  // Generate QR
  renderQR(e.url);

  // Counter
  document.getElementById('counter').textContent = `${idx + 1} of ${events.length}`;
}

function renderQR(url) {
  const qr = qrcode(0, 'M');     // 0 = auto type, 'M' = medium error correction
  qr.addData(url);
  qr.make();
  // Cell size of 4 → SVG sized later by CSS
  document.getElementById('qr').innerHTML = qr.createSvgTag({ cellSize: 4, margin: 0, scalable: true });
}

function formatWhen(e) {
  // e.start is "2026-05-14 18:00:00" (local Vancouver time, no tz suffix)
  // We parse it as if local — the browser running this is in Vancouver too.
  const s = new Date(e.start.replace(' ', 'T'));
  if (isNaN(s.getTime())) return '';

  const dayLabel = s.toLocaleDateString('en-CA', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  if (e.all_day) return dayLabel + ' · All day';

  const t1 = s.toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit' });
  const endStr = e.end && e.end.replace(' ', 'T');
  const en = endStr ? new Date(endStr) : null;
  const t2 = en && !isNaN(en.getTime())
    ? en.toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit' })
    : '';
  return `${dayLabel} · ${t1}${t2 ? ' – ' + t2 : ''}`;
}

function formatWhere(e) {
  const parts = [e.venue, e.city].filter(Boolean);
  return parts.join(' · ');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function rotate() {
  if (events.length < 2) return;
  idx = (idx + 1) % events.length;
  render();
}

loadData();
setInterval(rotate, ROTATE_MS);
setInterval(loadData, RELOAD_MS);
</script>
</body>
</html>
