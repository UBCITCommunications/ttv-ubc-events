name: Fetch UBC Events

on:
  schedule:
    - cron: '0 13 * * *'    # daily at 06:00 PT (13:00 UTC)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'fetch_events.py'
      - '.github/workflows/fetch-events.yml'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Fetch and filter events
        run: python fetch_events.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --staged --quiet || git commit -m "Update events $(date -u +%FT%TZ)"
          git push
